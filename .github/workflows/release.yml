name: Release

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip bump commits to prevent infinite loop.
    # This is safe in an `if:` expression (evaluated by Actions, not shell).
    if: ${{ !startsWith(github.event.head_commit.message, 'bump:') }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # ── Quality gates ──────────────────────────────────────────────

      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4

      - run: go test -race ./...

      # ── Version bump ───────────────────────────────────────────────

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install commitizen

      - name: Bump version
        id: bump
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          cz bump --yes --changelog 2>&1 || echo "no_bump=true" >> "$GITHUB_OUTPUT"
          echo "version=$(cz version --project)" >> "$GITHUB_OUTPUT"

      - name: Push version bump
        if: steps.bump.outputs.no_bump != 'true'
        run: |
          git push origin main
          git push origin --tags

      # ── Docker build + push + sign ─────────────────────────────────

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.VERSION }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.VERSION }}
            type=sha
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      # ── GitHub Release ─────────────────────────────────────────────

      - name: Create GitHub Release
        if: steps.bump.outputs.no_bump != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
